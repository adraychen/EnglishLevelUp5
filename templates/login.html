{% extends "base.html" %}
{% block content %}
<div style="max-width:400px;margin:60px auto;">
  <div class="card">
    <div class="card-title">Log in</div>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input class="form-control" type="email" name="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" name="password" required>
      </div>
      <button class="btn btn-primary" style="width:100%">Log in</button>
    </form>
    <p style="margin-top:16px;font-size:13px;color:#6c757d;text-align:center;">
      No account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
