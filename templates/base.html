<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎓 English Fluency Coach</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f5f6fa; color: #212529; min-height: 100vh; }
    nav { background: #fff; border-bottom: 1px solid #e9ecef; padding: 14px 24px;
          display: flex; align-items: center; justify-content: space-between; }
    nav .brand { font-weight: 600; font-size: 16px; color: #212529; text-decoration: none; }
    nav .nav-links a { color: #6c757d; text-decoration: none; font-size: 14px; margin-left: 20px; }
    nav .nav-links a:hover { color: #212529; }
    .container { max-width: 860px; margin: 0 auto; padding: 32px 24px; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #e9ecef;
            padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #212529; }
    .btn { display: inline-block; padding: 10px 22px; border-radius: 8px; border: none;
           font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none;
           transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-secondary { background: #e9ecef; color: #495057; }
    .btn-success { background: #198754; color: #fff; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500;
                        color: #495057; margin-bottom: 6px; }
    .form-control { width: 100%; padding: 10px 14px; border: 1px solid #ced4da;
                    border-radius: 8px; font-size: 14px; outline: none; }
    .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,.1); }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    .alert-danger { background: #f8d7da; color: #842029; }
    .score-badge { display: inline-block; padding: 3px 10px; border-radius: 20px;
                   font-size: 12px; font-weight: 500; }
    .badge-beginner     { background: #f8d7da; color: #842029; }
    .badge-developing   { background: #fff3cd; color: #664d03; }
    .badge-intermediate { background: #d1ecf1; color: #0c5460; }
    .badge-fluent       { background: #d4edda; color: #155724; }
    .badge-mastery      { background: #cfe2ff; color: #084298; }
    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('dashboard') }}" class="brand">🎓 English Fluency Coach</a>
    <div class="nav-links">
      {% if current_user.is_authenticated %}
        <a href="{{ url_for('chat') }}">New conversation</a>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('logout') }}">Log out</a>
      {% endif %}
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
